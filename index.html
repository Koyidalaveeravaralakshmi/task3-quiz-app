<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">
        <h1>Interactive Quiz App</h1>

        <div id="quiz">
            <h2 id="question">Question text</h2>

            <div class="options">
                <button class="option-btn" onclick="selectAnswer(0)">Option 1</button>
                <button class="option-btn" onclick="selectAnswer(1)">Option 2</button>
                <button class="option-btn" onclick="selectAnswer(2)">Option 3</button>
                <button class="option-btn" onclick="selectAnswer(3)">Option 4</button>
            </div>

            <p id="result"></p>
            <button id="next-btn" onclick="nextQuestion()">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
